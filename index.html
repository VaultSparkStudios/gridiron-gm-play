<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Gridiron GM — Play</title>
    <meta name="description" content="Real-time football engine for Gridiron GM — run plays, scramble, defend, and score." />
    <meta property="og:title" content="Gridiron GM — Play" />
    <meta property="og:description" content="Real-time football engine for Gridiron GM. Run plays, scramble, defend, score." />
    <meta property="og:image" content="https://vaultsparkstudios.com/gridiron-gm-play/images/cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vaultsparkstudios.com/gridiron-gm-play/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gridiron GM — Play" />
    <meta name="twitter:description" content="Real-time football engine for Gridiron GM." />
    <meta name="twitter:image" content="https://vaultsparkstudios.com/gridiron-gm-play/images/cover.png" />
    <style>
      * { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
      body { background:#0a0f1a; display:flex; align-items:center; justify-content:center; min-height:100svh; overflow:hidden; }
      canvas { display:block; max-width:100%; max-height:100svh; }
      #gm-gate{position:fixed;inset:0;background:#0a0f1a;z-index:99999;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;}
      #gm-gate.hidden{display:none;}
      #gm-gate-inner{text-align:center;padding:32px 24px;max-width:360px;width:100%;}
      #gm-gate h1{font-size:22px;font-weight:900;color:#e2e8f0;letter-spacing:2px;margin-bottom:4px;}
      #gm-gate p{font-size:13px;color:#475569;margin-bottom:24px;}
      #gm-gate input{width:100%;background:#0f172a;border:1px solid #1e293b;border-radius:6px;padding:10px 14px;font-size:15px;color:#e2e8f0;text-align:center;letter-spacing:3px;outline:none;margin-bottom:12px;}
      #gm-gate input:focus{border-color:#3b82f6;}
      #gm-gate button{width:100%;background:#1d4ed8;color:#fff;border:none;border-radius:6px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;}
      #gm-gate button:hover{background:#2563eb;}
      #gm-gate .err{font-size:12px;color:#ef4444;margin-top:8px;min-height:16px;}
      #gm-gate .badge{display:inline-block;background:#1e293b;color:#475569;font-size:11px;border-radius:4px;padding:3px 10px;margin-bottom:20px;letter-spacing:1px;}
    </style>
  </head>
  <body>
    <div id="gm-gate">
      <div id="gm-gate-inner">
        <div class="badge">VAULTSPARK STUDIOS</div>
        <h1>GRIDIRON GM</h1>
        <p>Early access — enter the preview code to continue.</p>
        <input id="gm-pw" type="password" placeholder="••••••••" autocomplete="off" />
        <button onclick="gmUnlock()">ENTER</button>
        <div class="err" id="gm-err"></div>
      </div>
    </div>
    <script>
      (function(){
        if(sessionStorage.getItem('gm_preview')==='1'){
          document.getElementById('gm-gate').classList.add('hidden');
        }
      })();
      function gmUnlock(){
        var pw=document.getElementById('gm-pw').value.trim().toLowerCase();
        if(pw==='vsgm2026'){
          sessionStorage.setItem('gm_preview','1');
          document.getElementById('gm-gate').classList.add('hidden');
        } else {
          document.getElementById('gm-err').textContent='Incorrect code. Try again.';
          document.getElementById('gm-pw').value='';
          document.getElementById('gm-pw').focus();
        }
      }
      document.getElementById('gm-pw').addEventListener('keydown',function(e){if(e.key==='Enter')gmUnlock();});
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
